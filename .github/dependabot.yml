version: 2
updates:
  # npm (Dependabot reads the pnpm lockfile under the "npm" ecosystem)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # OpenTelemetry packages are released in lockstep — update them together.
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      # NestJS packages also move together.
      nestjs:
        patterns:
          - "@nestjs/*"
      # Bundle the remaining dev tooling's minor/patch bumps into one PR.
      # (Majors still get individual PRs so they can be reviewed on their own.)
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Keep the GitHub Actions in our workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
